name: Databricks ETL Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validar sintaxis
        run: |
          pip install pyflakes
          find . -name "*.py" -exec python -m pyflakes {} \;
          echo "✅ Sintaxis válida"
      - name: Verificar estructura
        run: |
          test -f config/settings.py && echo "✅ config/settings.py"
          test -f notebooks/bronze/01_ingest_raw.py && echo "✅ Bronze"
          test -f notebooks/silver/02_clean_transform.py && echo "✅ Silver"
          test -f notebooks/gold/03_aggregate_metrics.py && echo "✅ Gold"

  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy notebooks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks workspace mkdirs /Repos/lucianoAgama13/databricks_project/config || true
          databricks workspace mkdirs /Repos/lucianoAgama13/databricks_project/notebooks/bronze || true
          databricks workspace mkdirs /Repos/lucianoAgama13/databricks_project/notebooks/silver || true
          databricks workspace mkdirs /Repos/lucianoAgama13/databricks_project/notebooks/gold || true

          databricks workspace import config/settings.py \
            /Repos/lucianoAgama13/databricks_project/config/settings \
            --language PYTHON --overwrite || true

          databricks workspace import notebooks/bronze/01_ingest_raw.py \
            /Repos/lucianoAgama13/databricks_project/notebooks/bronze/01_ingest_raw \
            --language PYTHON --overwrite

          databricks workspace import notebooks/silver/02_clean_transform.py \
            /Repos/lucianoAgama13/databricks_project/notebooks/silver/02_clean_transform \
            --language PYTHON --overwrite

          databricks workspace import notebooks/gold/03_aggregate_metrics.py \
            /Repos/lucianoAgama13/databricks_project/notebooks/gold/03_aggregate_metrics \
            --language PYTHON --overwrite

          echo "✅ Notebooks desplegados"

  run_etl:
    name: Run ETL Pipeline
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Run Bronze
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          RUN_ID=$(databricks jobs submit \
            --json '{
              "run_name": "CI_Bronze",
              "existing_cluster_id": "${{ secrets.DATABRICKS_CLUSTER_ID }}",
              "notebook_task": {
                "notebook_path": "/Repos/lucianoAgama13/databricks_project/notebooks/bronze/01_ingest_raw"
              }
            }' | jq -r '.run_id')
          echo "Bronze Run ID: $RUN_ID"
          databricks runs wait $RUN_ID
          STATE=$(databricks runs get $RUN_ID | jq -r '.state.result_state')
          echo "Bronze result: $STATE"
          [ "$STATE" = "SUCCESS" ] || exit 1

      - name: Run Silver
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          RUN_ID=$(databricks jobs submit \
            --json '{
              "run_name": "CI_Silver",
              "existing_cluster_id": "${{ secrets.DATABRICKS_CLUSTER_ID }}",
              "notebook_task": {
                "notebook_path": "/Repos/lucianoAgama13/databricks_project/notebooks/silver/02_clean_transform"
              }
            }' | jq -r '.run_id')
          echo "Silver Run ID: $RUN_ID"
          databricks runs wait $RUN_ID
          STATE=$(databricks runs get $RUN_ID | jq -r '.state.result_state')
          echo "Silver result: $STATE"
          [ "$STATE" = "SUCCESS" ] || exit 1

      - name: Run Gold
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          RUN_ID=$(databricks jobs submit \
            --json '{
              "run_name": "CI_Gold",
              "existing_cluster_id": "${{ secrets.DATABRICKS_CLUSTER_ID }}",
              "notebook_task": {
                "notebook_path": "/Repos/lucianoAgama13/databricks_project/notebooks/gold/03_aggregate_metrics"
              }
            }' | jq -r '.run_id')
          echo "Gold Run ID: $RUN_ID"
          databricks runs wait $RUN_ID
          STATE=$(databricks runs get $RUN_ID | jq -r '.state.result_state')
          echo "Gold result: $STATE"
          [ "$STATE" = "SUCCESS" ] || exit 1

      - name: Pipeline completado
        run: echo "✅ ETL Medallion ejecutado Bronze → Silver → Gold"