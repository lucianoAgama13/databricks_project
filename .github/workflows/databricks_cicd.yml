name: Databricks ETL Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validar sintaxis
        run: |
          pip install pyflakes
          find . -name "*.py" -exec python -m pyflakes {} \;
          echo "Sintaxis valida"
      - name: Verificar estructura
        run: |
          test -f config/settings.py && echo "config ok"
          test -f notebooks/bronze/01_ingest_raw.py && echo "Bronze ok"
          test -f notebooks/silver/02_clean_transform.py && echo "Silver ok"
          test -f notebooks/gold/03_aggregate_metrics.py && echo "Gold ok"

  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
      - name: Deploy notebooks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks workspace mkdirs /Repos/lucianoAgama13/databricks_project/notebooks/bronze || true
          databricks workspace mkdirs /Repos/lucianoAgama13/databricks_project/notebooks/silver || true
          databricks workspace mkdirs /Repos/lucianoAgama13/databricks_project/notebooks/gold || true
          databricks workspace import notebooks/bronze/01_ingest_raw.py /Repos/lucianoAgama13/databricks_project/notebooks/bronze/01_ingest_raw --language PYTHON --overwrite
          databricks workspace import notebooks/silver/02_clean_transform.py /Repos/lucianoAgama13/databricks_project/notebooks/silver/02_clean_transform --language PYTHON --overwrite
          databricks workspace import notebooks/gold/03_aggregate_metrics.py /Repos/lucianoAgama13/databricks_project/notebooks/gold/03_aggregate_metrics --language PYTHON --overwrite
          echo "Notebooks desplegados"