name: Databricks ETL Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validar sintaxis
        run: |
          pip install pyflakes
          find . -name "*.py" -exec python -m pyflakes {} \;
          echo "Sintaxis valida"

  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
      - name: Deploy notebooks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks workspace import --file notebooks/bronze/01_ingest_raw.py --language PYTHON --overwrite /Repos/lucianoAgama13/databricks_project/notebooks/bronze/01_ingest_raw
          databricks workspace import --file notebooks/silver/02_clean_transform.py --language PYTHON --overwrite /Repos/lucianoAgama13/databricks_project/notebooks/silver/02_clean_transform
          databricks workspace import --file notebooks/gold/03_aggregate_metrics.py --language PYTHON --overwrite /Repos/lucianoAgama13/databricks_project/notebooks/gold/03_aggregate_metrics
          echo "Notebooks desplegados"